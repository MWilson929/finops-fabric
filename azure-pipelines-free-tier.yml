# Temporary Pipeline for Free Tier
# This version runs everything in a single job to avoid parallelism issues

trigger:
- main
- develop

variables:
  pythonVersion: '3.11'
  azureServiceConnection: 'fabric-service-connection'

pool:
  vmImage: 'ubuntu-latest'

stages:
- stage: BuildAndDeployAll
  displayName: 'Build and Deploy (Sequential)'
  jobs:
  - job: BuildValidateAndDeploy
    displayName: 'Build, Validate and Deploy to All Environments'
    
    steps:
    # Build and Validation Steps
    - task: UsePythonVersion@0
      inputs:
        versionSpec: '$(pythonVersion)'
    
    - script: |
        python -m pip install --upgrade pip
        pip install pyyaml
      displayName: 'Install Dependencies'
    
    # Package artifacts
    - task: CopyFiles@2
      inputs:
        SourceFolder: '.'
        Contents: |
          notebooks/**
          scripts/**
          config/**
        TargetFolder: '$(Build.ArtifactStagingDirectory)/fca-deployment-package'
    
    - task: PublishBuildArtifacts@1
      inputs:
        PathtoPublish: '$(Build.ArtifactStagingDirectory)/fca-deployment-package'
        ArtifactName: 'fca-deployment-package'
    
    # Deploy to Dev (always)
    - task: DownloadBuildArtifacts@0
      inputs:
        artifactName: 'fca-deployment-package'
    
    - script: |
        echo "Deploying to Development environment..."
        # Add your dev deployment steps here
      displayName: 'Deploy to Development'
      condition: always()
    
    # Deploy to Test (main branch only)  
    - script: |
        echo "Deploying to Test environment..."
        # Add your test deployment steps here
      displayName: 'Deploy to Test'
      condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
    
    # Deploy to Production (manual approval required - would need to be separate stage)
    # This would need manual approval which requires separate stage