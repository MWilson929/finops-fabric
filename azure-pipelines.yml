# FinOps Hub Microsoft Fabric CI/CD
#
# Branches are environment state:
#   dev      -> Dev
#   preprod  -> Preprod Data Engineering, then Preprod Reporting
#   main     -> Prod Data Engineering, then Prod Reporting
#
# Pull requests validate only. Deployments always publish the complete desired
# state represented by the target branch.

trigger:
  branches:
    include:
      - dev
      - preprod
      - main
  paths:
    include:
      - azure-pipelines.yml
      - fabric-config.yml
      - parameter.yml
      - requirements-cicd.txt
      - config/**
      - scripts/**
      - docs/naming_standards.md
      - docs/notebook_standards.md
      - docs/lakehouse_standards.md
      - notebooks/**
      - lakehouses/**
      - datapipelines/**
      - dataflows/**
      - environments/**
      - eventhouses/**
      - sqldatabases/**
      - variablelibraries/**
      - udfs/**
      - warehouses/**
      - semanticmodels/**
      - reports/**

pr:
  branches:
    include:
      - dev
      - preprod
      - main
  paths:
    include:
      - azure-pipelines.yml
      - fabric-config.yml
      - parameter.yml
      - requirements-cicd.txt
      - config/**
      - scripts/**
      - docs/naming_standards.md
      - docs/notebook_standards.md
      - docs/lakehouse_standards.md
      - notebooks/**
      - lakehouses/**
      - datapipelines/**
      - dataflows/**
      - environments/**
      - eventhouses/**
      - sqldatabases/**
      - variablelibraries/**
      - udfs/**
      - warehouses/**
      - semanticmodels/**
      - reports/**

variables:
  pythonVersion: '3.12'
  artifactName: 'finops-fabric-release'
  nonProdServiceConnection: 'fabric-cicd-nonprod'
  prodServiceConnection: 'fabric-cicd-prod'

pool:
  vmImage: ubuntu-latest

stages:
  - stage: Validate
    displayName: Validate Fabric release
    jobs:
      - job: Validate
        displayName: Validate source and parameterization
        steps:
          - checkout: self
            clean: true

          - task: UsePythonVersion@0
            inputs:
              versionSpec: $(pythonVersion)
              addToPath: true

          - script: python -m pip install --requirement requirements-cicd.txt
            displayName: Install pinned CI/CD dependencies

          - script: python scripts/validate_fabric_repository.py
            displayName: Validate Fabric repository

          - task: CopyFiles@2
            condition: and(succeeded(), ne(variables['Build.Reason'], 'PullRequest'))
            inputs:
              SourceFolder: $(Build.SourcesDirectory)
              Contents: |
                fabric-config.yml
                parameter.yml
                requirements-cicd.txt
                config/**
                docs/naming_standards.md
                docs/notebook_standards.md
                docs/lakehouse_standards.md
                scripts/**
                notebooks/**
                lakehouses/**
                datapipelines/**
                dataflows/**
                environments/**
                eventhouses/**
                sqldatabases/**
                variablelibraries/**
                udfs/**
                warehouses/**
                semanticmodels/**
                reports/**
              TargetFolder: $(Build.ArtifactStagingDirectory)/$(artifactName)
              CleanTargetFolder: true
            displayName: Stage Fabric release artifact

          - task: PublishPipelineArtifact@1
            condition: and(succeeded(), ne(variables['Build.Reason'], 'PullRequest'))
            inputs:
              targetPath: $(Build.ArtifactStagingDirectory)/$(artifactName)
              artifact: $(artifactName)
              publishLocation: pipeline
            displayName: Publish immutable release artifact

  - stage: DeployDev
    displayName: Deploy Dev
    dependsOn: Validate
    condition: and(succeeded(), ne(variables['Build.Reason'], 'PullRequest'), eq(variables['Build.SourceBranch'], 'refs/heads/dev'))
    variables:
      - group: fabric-dev
    jobs:
      - deployment: DeployDev
        displayName: Deploy Dev workspace
        environment: fabric-dev
        strategy:
          runOnce:
            deploy:
              steps:
                - download: current
                  artifact: $(artifactName)

                - task: UsePythonVersion@0
                  inputs:
                    versionSpec: $(pythonVersion)
                    addToPath: true

                - task: AzureCLI@2
                  displayName: Deploy Dev with fabric-cicd
                  inputs:
                    azureSubscription: $(nonProdServiceConnection)
                    scriptType: bash
                    scriptLocation: inlineScript
                    workingDirectory: $(Pipeline.Workspace)/$(artifactName)
                    inlineScript: |
                      set -euo pipefail
                      python -m pip install --requirement requirements-cicd.txt
                      python scripts/deploy_fabric_items.py \
                        --environment DEV \
                        --workspace-id "$DEV_WORKSPACE_ID" \
                        --scope all
                  env:
                    DEV_WORKSPACE_ID: $(workspace-id)
                    DEV_STORAGE_ACCOUNT_NAME: $(storage-account-name)
                    DEV_CONTAINER_NAME: $(container-name)
                    DEV_CONNECTION_ID: $(connection-id)
                    DEV_LAKEHOUSE_CONNECTION: $(lakehouse-connection-id)

  - stage: DeployPreprodEngineering
    displayName: Deploy Preprod Data Engineering
    dependsOn: Validate
    condition: and(succeeded(), ne(variables['Build.Reason'], 'PullRequest'), eq(variables['Build.SourceBranch'], 'refs/heads/preprod'))
    variables:
      - group: fabric-preprod
    jobs:
      - deployment: DeployPreprodEngineering
        displayName: Deploy Preprod Data Engineering workspace
        environment: fabric-preprod-engineering
        strategy:
          runOnce:
            deploy:
              steps:
                - download: current
                  artifact: $(artifactName)

                - task: UsePythonVersion@0
                  inputs:
                    versionSpec: $(pythonVersion)
                    addToPath: true

                - task: AzureCLI@2
                  displayName: Deploy Preprod engineering with fabric-cicd
                  inputs:
                    azureSubscription: $(nonProdServiceConnection)
                    scriptType: bash
                    scriptLocation: inlineScript
                    workingDirectory: $(Pipeline.Workspace)/$(artifactName)
                    inlineScript: |
                      set -euo pipefail
                      python -m pip install --requirement requirements-cicd.txt
                      python scripts/deploy_fabric_items.py \
                        --environment PREPROD_ENGINEERING \
                        --workspace-id "$PREPROD_ENGINEERING_WORKSPACE_ID" \
                        --scope engineering
                  env:
                    PREPROD_ENGINEERING_WORKSPACE_ID: $(engineering-workspace-id)
                    PREPROD_STORAGE_ACCOUNT_NAME: $(storage-account-name)
                    PREPROD_CONTAINER_NAME: $(container-name)
                    PREPROD_CONNECTION_ID: $(connection-id)
                    PREPROD_LAKEHOUSE_CONNECTION: $(lakehouse-connection-id)

  - stage: DeployPreprodReporting
    displayName: Deploy Preprod Reporting
    dependsOn: DeployPreprodEngineering
    condition: succeeded()
    variables:
      - group: fabric-preprod
    jobs:
      - deployment: DeployPreprodReporting
        displayName: Deploy Preprod Reporting workspace
        environment: fabric-preprod-reporting
        strategy:
          runOnce:
            deploy:
              steps:
                - download: current
                  artifact: $(artifactName)

                - task: UsePythonVersion@0
                  inputs:
                    versionSpec: $(pythonVersion)
                    addToPath: true

                - task: AzureCLI@2
                  displayName: Deploy Preprod reporting with fabric-cicd
                  inputs:
                    azureSubscription: $(nonProdServiceConnection)
                    scriptType: bash
                    scriptLocation: inlineScript
                    workingDirectory: $(Pipeline.Workspace)/$(artifactName)
                    inlineScript: |
                      set -euo pipefail
                      python -m pip install --requirement requirements-cicd.txt
                      python scripts/deploy_fabric_items.py \
                        --environment PREPROD_REPORTING \
                        --workspace-id "$PREPROD_REPORTING_WORKSPACE_ID" \
                        --scope reporting
                  env:
                    PREPROD_REPORTING_WORKSPACE_ID: $(reporting-workspace-id)
                    PREPROD_ENGINEERING_WORKSPACE_ID: $(engineering-workspace-id)
                    PREPROD_LAKEHOUSE_CONNECTION: $(lakehouse-connection-id)

  - stage: DeployProdEngineering
    displayName: Deploy Prod Data Engineering
    dependsOn: Validate
    condition: and(succeeded(), ne(variables['Build.Reason'], 'PullRequest'), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
    variables:
      - group: fabric-prod
    jobs:
      - deployment: DeployProdEngineering
        displayName: Deploy Prod Data Engineering workspace
        environment: fabric-prod-engineering
        strategy:
          runOnce:
            deploy:
              steps:
                - download: current
                  artifact: $(artifactName)

                - task: UsePythonVersion@0
                  inputs:
                    versionSpec: $(pythonVersion)
                    addToPath: true

                - task: AzureCLI@2
                  displayName: Deploy Prod engineering with fabric-cicd
                  inputs:
                    azureSubscription: $(prodServiceConnection)
                    scriptType: bash
                    scriptLocation: inlineScript
                    workingDirectory: $(Pipeline.Workspace)/$(artifactName)
                    inlineScript: |
                      set -euo pipefail
                      python -m pip install --requirement requirements-cicd.txt
                      python scripts/deploy_fabric_items.py \
                        --environment PROD_ENGINEERING \
                        --workspace-id "$PROD_ENGINEERING_WORKSPACE_ID" \
                        --scope engineering
                  env:
                    PROD_ENGINEERING_WORKSPACE_ID: $(engineering-workspace-id)
                    PROD_STORAGE_ACCOUNT_NAME: $(storage-account-name)
                    PROD_CONTAINER_NAME: $(container-name)
                    PROD_CONNECTION_ID: $(connection-id)
                    PROD_LAKEHOUSE_CONNECTION: $(lakehouse-connection-id)

  - stage: DeployProdReporting
    displayName: Deploy Prod Reporting
    dependsOn: DeployProdEngineering
    condition: succeeded()
    variables:
      - group: fabric-prod
    jobs:
      - deployment: DeployProdReporting
        displayName: Deploy Prod Reporting workspace
        environment: fabric-prod-reporting
        strategy:
          runOnce:
            deploy:
              steps:
                - download: current
                  artifact: $(artifactName)

                - task: UsePythonVersion@0
                  inputs:
                    versionSpec: $(pythonVersion)
                    addToPath: true

                - task: AzureCLI@2
                  displayName: Deploy Prod reporting with fabric-cicd
                  inputs:
                    azureSubscription: $(prodServiceConnection)
                    scriptType: bash
                    scriptLocation: inlineScript
                    workingDirectory: $(Pipeline.Workspace)/$(artifactName)
                    inlineScript: |
                      set -euo pipefail
                      python -m pip install --requirement requirements-cicd.txt
                      python scripts/deploy_fabric_items.py \
                        --environment PROD_REPORTING \
                        --workspace-id "$PROD_REPORTING_WORKSPACE_ID" \
                        --scope reporting
                  env:
                    PROD_REPORTING_WORKSPACE_ID: $(reporting-workspace-id)
                    PROD_ENGINEERING_WORKSPACE_ID: $(engineering-workspace-id)
                    PROD_LAKEHOUSE_CONNECTION: $(lakehouse-connection-id)
