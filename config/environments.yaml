environments:
  dev:
    storage_account: "PLACEHOLDER_DEV_STORAGE_ACCOUNT"
    workspace_name: "Finops Dev" 
    workspace_id: "PLACEHOLDER_DEV_WORKSPACE_ID"
    container_name: "msexports"
    subscription_id: "PLACEHOLDER_DEV_SUBSCRIPTION_ID"
    cost_export_path: "focuscost/dev-subscription-id"
    environment_suffix: "_Dev"
    
  test:
    storage_account: "PLACEHOLDER_TEST_STORAGE_ACCOUNT"
    workspace_name: "Finops Test"
    workspace_id: "PLACEHOLDER_TEST_WORKSPACE_ID" 
    container_name: "msexports"
    subscription_id: "PLACEHOLDER_TEST_SUBSCRIPTION_ID"
    cost_export_path: "focuscost/test-subscription-id"
    environment_suffix: "_Test"
    
  prod:
    storage_account: "PLACEHOLDER_PROD_STORAGE_ACCOUNT"
    workspace_name: "Finops Prod"
    workspace_id: "PLACEHOLDER_PROD_WORKSPACE_ID"
    container_name: "msexports" 
    subscription_id: "PLACEHOLDER_PROD_SUBSCRIPTION_ID"
    cost_export_path: "focuscost/prod-subscription-id"
    environment_suffix: ""

# Common settings across all environments
common:
  fabric_api_version: "v1"
  default_retention_days: 90
  cost_export_format: "csv"
  enable_auto_refresh: true
  max_parallel_jobs: 5
  
# Pipeline-specific configuration  
pipeline:
  validation:
    enable_syntax_check: true
    enable_schema_validation: true
    enable_integration_tests: true
    
  deployment:
    enable_incremental_deployment: true
    backup_before_deployment: true
    rollback_on_failure: true
    
  monitoring:
    enable_health_checks: true
    notification_email: "fabric-admin@company.com"
    alert_thresholds:
      deployment_time_minutes: 30
      failure_rate_percent: 5