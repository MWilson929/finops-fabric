# Minimal Fabric CI/CD Configuration for Testing
# This is a simplified version to test experimental features

enable_experimental_features: true
enable_config_deploy: true

core:
  workspace_id:
    DEV: "$ENV:DEV_WORKSPACE_ID"
    TEST: "$ENV:TEST_WORKSPACE_ID" 
    PROD: "$ENV:PROD_WORKSPACE_ID"
  
  repository_directory: "."
  
  item_types_in_scope:
    - Notebook
    - Lakehouse
  
  parameter: "parameter.yml"

publish:
  skip:
    DEV: false
    TEST: false
    PROD: false