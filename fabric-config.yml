# Microsoft Fabric CI/CD Configuration
# Configuration-based deployment for all Fabric item types
# Note: Feature flags are set programmatically in deploy_fabric_items.py

core:
  # Environment-specific workspace mappings
  workspace_id:
    DEV: "$ENV:DEV_WORKSPACE_ID"
    
  workspace:
    DEV: "Fabric Development"
    
  # Repository directory containing all Fabric items
  repository_directory: "."
  
  # Basic Fabric item types for simple deployment
  item_types_in_scope:
    - Notebook
    - Lakehouse
    - SQLDatabase

publish:
  # Exclude items with specific patterns from deployment
  exclude_regex: "^(TEMP_|DEBUG_|DRAFT_).*"
  
  # Exclude items in specific folders
  folder_exclude_regex: "^(temp|debug|drafts)/"
  
  # Force update existing items
  overwrite_existing: true
  
  # Environment-specific publishing controls
  skip:
    DEV: false    # Always deploy to dev

unpublish:
  # Remove orphaned items not found in repository
  exclude_regex: "^(SYSTEM_|ADMIN_).*"
  
  skip:
    DEV: true     # Skip unpublish in dev to prevent item removal

# Additional features moved to root level above

constants:
  # Override default constants if needed
  DEFAULT_API_ROOT_URL: "https://api.fabric.microsoft.com"