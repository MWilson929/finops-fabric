# Microsoft Fabric CI/CD Parameter Configuration
# Environment-specific replacements for ADLS Gen2 shortcuts and Fabric items

find_replace:
  # ADLS Gen2 Storage Account Names - Replace with environment-specific accounts
  - find_value: "PLACEHOLDER_STORAGE_ACCOUNT"
    replace_value:
      DEV: "$ENV:DEV_STORAGE_ACCOUNT_NAME"
      TEST: "$ENV:TEST_STORAGE_ACCOUNT_NAME" 
      PROD: "$ENV:PROD_STORAGE_ACCOUNT_NAME"
    
  # ADLS Gen2 Container Names - Replace with environment-specific containers  
  - find_value: "PLACEHOLDER_CONTAINER_NAME"
    replace_value:
      DEV: "$ENV:DEV_CONTAINER_NAME"
      TEST: "$ENV:TEST_CONTAINER_NAME"
      PROD: "$ENV:PROD_CONTAINER_NAME"
      
  # ADLS Gen2 Connection IDs - Replace with environment-specific connection IDs
  - find_value: "PLACEHOLDER_CONNECTION_ID"
    replace_value:
      DEV: "$ENV:DEV_CONNECTION_ID"
      TEST: "$ENV:TEST_CONNECTION_ID"
      PROD: "$ENV:PROD_CONNECTION_ID"

  # Workspace References - Dynamic replacement for workspace IDs
  - find_value: "PLACEHOLDER_WORKSPACE_ID"
    replace_value:
      _ALL_: "$workspace.$id"
      
  # Lakehouse references using dynamic replacement (for notebooks)
  - find_value: \#\s*META\s+"default_lakehouse":\s*"([0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12})"
    replace_value:
      _ALL_: "$items.Lakehouse.FinOpsHub.$id"
    is_regex: "true"
    item_type: "Notebook"
    
  # Lakehouse workspace references using dynamic replacement (for notebooks)
  - find_value: \#\s*META\s+"default_lakehouse_workspace_id":\s*"([0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12})"
    replace_value:
      _ALL_: "$workspace.$id"
    is_regex: "true"
    item_type: "Notebook"

key_value_replace:
  # Data Pipeline connection references
  - find_key: $.properties.activities[?(@.typeProperties.source.datasetSettings.externalReferences.connection)]
    replace_value:
      DEV: "$ENV:DEV_CONNECTION_ID"
      TEST: "$ENV:TEST_CONNECTION_ID" 
      PROD: "$ENV:PROD_CONNECTION_ID"
    item_type: "DataPipeline"
    
  # Schedule enablement by environment
  - find_key: $.schedules[?(@.jobType=="Execute")].enabled
    replace_value:
      DEV: false
      TEST: true
      PROD: true
    file_path: "**/.schedules"
    
  # Dataflow connection settings
  - find_key: $.connections[?(@.kind=="Lakehouse")].connectionId
    replace_value:
      DEV: "$ENV:DEV_LAKEHOUSE_CONNECTION"
      TEST: "$ENV:TEST_LAKEHOUSE_CONNECTION"
      PROD: "$ENV:PROD_LAKEHOUSE_CONNECTION"
    item_type: "Dataflow"

spark_pool:
  # Environment-specific Spark pool configurations
  - instance_pool_id: "PLACEHOLDER_SPARK_POOL_ID"
    replace_value:
      DEV:
        type: "Workspace"
        name: "DefaultPool"
      TEST:
        type: "Capacity"
        name: "TestPool_Medium"
      PROD:
        type: "Capacity" 
        name: "ProdPool_Large"

gateway_binding:
  # On-premises gateway bindings for semantic models
  - gateway_id: "$ENV:GATEWAY_ID"
    dataset_name: 
      - "CostAnalysisModel"
      - "FinOpsReporting"